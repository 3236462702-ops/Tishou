# =============================================================================
# TiShou — GitHub Actions 自动构建 APK
# 版本：v2.6.1
# 生成日期：2026-06-23
# 更新内容：C11 修复p4a模板未被使用导致无障碍服务不注册(双重保险:绝对路径+构建前强制替换模板)
# =============================================================================
# 触发条件：推送到 main 分支时自动构建
# 构建环境：ubuntu-latest + Docker (kivy/buildozer)
# 构建产物：debug APK，保留 7 天
#
# ═══════════════════════════════════════════════════════════════
# 安卓专属依赖说明（Windows 上无法安装，由 CI 容器编译注入）：
#   pyjnius — Android Java 桥接（悬浮窗/通知/AudioTrack/权限检测）
#   jnius   — 访问 Android 系统 API
#   p4a      — python-for-android 运行时（提供 android 模块）
# 这些依赖在 buildozer.spec 的 requirements 中声明，
# 由 p4a 在容器内编译 APK 时从源码构建，不依赖 CI 宿主环境。
# ═══════════════════════════════════════════════════════════════
# =============================================================================

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 前置校验（配置/文件/Java检查）
        run: python pre_check.py

      - name: 清理旧 APK 文件（保留 .buildozer 缓存以加速增量构建）
        run: |
          rm -rf bin/*.apk 2>/dev/null || true

      - name: 拉取 Buildozer Docker 镜像
        run: docker pull kivy/buildozer:latest

      # C11 核心修复：在构建前强制替换 p4a 默认模板
      # 原因：buildozer android.manifest.template 选项未被 p4a 正确使用，
      #       导致自定义服务声明从未注入到 APK 中 => 无障碍服务不显示
      - name: 下载 p4a 并强制替换模板（C11 无障碍修复）
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/home/user/hostcwd" \
            --workdir /home/user/hostcwd \
            --env BUILDOZER_NO_TERMINAL=1 \
            kivy/buildozer:latest \
            bash -c "
              echo '=== 步骤 1/2: 下载 python-for-android 运行时 ==='
              buildozer android p4a -- --help 2>&1 | tail -5 || echo 'p4a 初始化完成（或已初始化）'
              echo ''
              echo '=== 步骤 2/2: 强制替换默认 AndroidManifest 模板 ==='
              find /home/user/hostcwd/.buildozer -name 'AndroidManifest.tmpl.xml' -path '*/templates/*' -exec cp -v /home/user/hostcwd/AndroidManifest.tmpl.xml {} \;
              if [ \$? -eq 0 ]; then
                echo '=== 模板替换成功！自定义服务声明已注入 ==='
              else
                echo '=== 警告：模板替换未找到目标文件，将回退到 android.manifest.template 配置 ==='
              fi
            "

      - name: 构建 APK
        run: |
          docker run --name tishou-builder \
            --rm \
            --volume "${{ github.workspace }}:/home/user/hostcwd" \
            --workdir /home/user/hostcwd \
            --env BUILDOZER_NO_TERMINAL=1 \
            kivy/buildozer:latest \
            buildozer android debug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: TiShou-debug-apk
          path: bin/*.apk
          retention-days: 7